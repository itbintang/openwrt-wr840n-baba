name: Build OpenWrt Lite TL-WR840N

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual klik tombol

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git subversion libncurses5-dev zlib1g-dev gawk flex gettext unzip wget python3 rsync

    - name: Download & Extract Image Builder
      run: |
        wget https://downloads.openwrt.org/releases/19.07.10/targets/ramips/mt76x8/openwrt-imagebuilder-19.07.10-ramips-mt76x8.Linux-x86_64.tar.xz
        tar -xf openwrt-imagebuilder-19.07.10-ramips-mt76x8.Linux-x86_64.tar.xz
        mv openwrt-imagebuilder-19.07.10-ramips-mt76x8.Linux-x86_64 openwrt-ib

    - name: Create Custom Configuration Files
      run: |
        cd openwrt-ib
        mkdir -p files/etc/config
        mkdir -p files/etc/uci-defaults

        # 1. Network Config
        cat << 'EOF' > files/etc/config/network
        config interface 'loopback'
        	option ifname 'lo'
        	option proto 'static'
        	option ipaddr '127.0.0.1'
        	option netmask '255.0.0.0'

        config globals 'globals'
        	option ula_prefix 'fd53:1a3a:3032::/48'

        config interface 'lan'
        	option type 'bridge'
        	option ifname 'eth0.1'
        	option proto 'static'
        	option ipaddr '192.168.10.1'
        	option netmask '255.255.255.0'
        	option ip6assign '60'
        	list dns '1.1.1.1'
        	list dns '8.8.8.8'

        config interface 'wan'
        	option ifname 'eth0.2'
        	option proto 'dhcp'

        config switch
        	option name 'switch0'
        	option reset '1'
        	option enable_vlan '1'

        config switch_vlan
        	option device 'switch0'
        	option vlan '1'
        	option ports '1 2 3 4 6t'

        config switch_vlan
        	option device 'switch0'
        	option vlan '2'
        	option ports '0 6t'
        EOF

        # 2. Wireless Config (SSID & Password)
        cat << 'EOF' > files/etc/config/wireless
        config wifi-device 'radio0'
        	option type 'mac80211'
        	option channel 'auto'
        	option hwmode '11g'
        	option path 'platform/10300000.wmac'
        	option htmode 'HT20'
        	option disabled '0'

        config wifi-iface 'default_radio0'
        	option device 'radio0'
        	option network 'lan'
        	option mode 'ap'
        	option ssid 'RT-RW NET - Kencang'
        	option encryption 'psk2'
        	option key 'internet123'
        EOF

        # 3. System Config (Timezone & Log)
        cat << 'EOF' > files/etc/config/system
        config system
        	option hostname 'OpenWrt-Lite'
        	option timezone 'WIB-7'
        	option zonename 'Asia/Jakarta'
        	option conloglevel '4'
        	option cronloglevel '9'

        config timeserver 'ntp'
        	list server '0.id.pool.ntp.org'
        	list server '1.id.pool.ntp.org'
        	list server 'time.google.com'
        	option enable_server '0'
        EOF

        # 4. Custom Script (Flow Offloading & RAM Tweak)
        cat << 'EOF' > files/etc/uci-defaults/99-custom-settings
        #!/bin/sh
        uci set firewall.@defaults[0].flow_offloading='1'
        uci commit firewall
        uci set system.@system[0].log_size='16'
        uci commit system
        /etc/init.d/firewall restart
        exit 0
        EOF
        chmod +x files/etc/uci-defaults/99-custom-settings

  - name: Compile Firmware (Make Image)
   run: |
     cd openwrt-ib
     # Cek profil yang mirip dengan wr840n
     PROFILES=$(make info | grep -i "wr840n" | awk -F: '{print $1}')
     echo "Profil yang ditemukan: $PROFILES"

     # Ambil profil pertama yang ditemukan, jika tidak ada gunakan default tplink_tl-wr840n-v6
     TARGET_PROFILE=$(echo "$PROFILES" | head -n 1)
     if [ -z "$TARGET_PROFILE" ]; then
       TARGET_PROFILE="tplink_tl-wr840n-v6"
     fi
     echo "Menggunakan profil: $TARGET_PROFILE"

     make image PROFILE="$TARGET_PROFILE" \
     PACKAGES="luci uhttpd dnsmasq firewall dropbear hostapd-mini wpad-basic ppp ppp-mod-pppoe -ip6tables -odhcpd -odhcp6c -ipv6helper -opkg -wget -curl -ppp-mod-pppoa -kmod-usb-core -kmod-usb2 -luci-app-opkg" \
     FILES="files"
